<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الحاسبة المالية والاستشارية | FAROUK GRUP</title>
    <!-- حماية الصفحة -->
    <script src="auth-check.js"></script>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* ========== أنماط البوابة العامة ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-dark: #0b0e17;
            --bg-panel: rgba(18, 24, 36, 0.85);
            --bg-card: rgba(22, 30, 46, 0.8);
            --border-light: rgba(180, 133, 84, 0.25);
            --accent-glow: #b48554;
            --accent-soft: #cfa776;
            --text-light: #f0f4fa;
            --text-muted: #aab7d4;
            --shadow-soft: 0 15px 35px -10px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(180, 133, 84, 0.15);
            --shadow-glow: 0 15px 35px -10px rgba(0, 0, 0, 0.8), 0 0 20px rgba(180, 133, 84, 0.3);
            --radius-md: 20px;
            --radius-lg: 30px;
            --transition: all 0.3s ease;
            --gold: #b8860b;
            --gold-light: #d4b15a;
            --danger: #dc3545;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background: radial-gradient(circle at 70% 30%, #141c2b, #0a0e16);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* خلفية متوهجة */
        .glow-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 0;
        }
        .glow-bg span {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(180,133,84,0.15) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: glowMove 20s infinite alternate ease-in-out;
        }
        .glow-bg span:nth-child(1) { top: -100px; right: -100px; width: 500px; height: 500px; background: radial-gradient(circle, rgba(180,133,84,0.12) 0%, transparent 70%); }
        .glow-bg span:nth-child(2) { bottom: -150px; left: -150px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(100,150,200,0.1) 0%, transparent 70%); }
        .glow-bg span:nth-child(3) { top: 30%; left: 30%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(180,133,84,0.1) 0%, transparent 70%); animation-delay: -5s; }
        @keyframes glowMove {
            0% { transform: translate(0, 0) scale(1); opacity: 0.5; }
            100% { transform: translate(40px, -30px) scale(1.2); opacity: 0.8; }
        }

        /* الهيدر (بدون اسم المستخدم وزر الخروج) */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-panel);
            backdrop-filter: blur(18px);
            border: 1px solid var(--border-light);
            border-radius: 80px;
            padding: 0.8rem 2rem;
            margin: 1rem 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
            box-shadow: var(--shadow-soft);
            z-index: 10;
            position: relative;
        }
        .datetime {
            display: flex;
            gap: 2rem;
            color: var(--text-muted);
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
        }
        .datetime i { color: var(--accent-soft); margin-left: 0.4rem; }
        .header-title {
            text-align: center;
            font-weight: 800;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #f0e6d2, #cfd9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* المحتوى الرئيسي */
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            position: relative;
            z-index: 2;
        }

        /* ========== أنماط الآلة الحاسبة (الأصلية) ========== */
        .calc-container {
            width: 950px;
            max-width: 98vw;
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            align-items: stretch;
            background: transparent;
        }
        .calculator {
            flex: 0 0 340px;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
        }
        .calculator-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.8rem;
        }
        .calculator-header h2 {
            color: var(--accent-soft);
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .calculator-header h2 i { color: var(--accent-glow); }
        .screen-container {
            background: rgba(10,14,23,0.8);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            padding: 0.8rem 1rem;
            margin-bottom: 1rem;
            text-align: left;
            direction: ltr;
        }
        .history-display {
            color: var(--text-muted);
            font-size: 0.85rem;
            font-family: 'Inter', monospace;
            min-height: 1.2rem;
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow-x: auto;
        }
        .main-display {
            color: var(--accent-soft);
            font-size: 1.8rem;
            font-weight: 700;
            font-family: 'Inter', monospace;
            white-space: nowrap;
            overflow-x: auto;
            letter-spacing: -0.5px;
        }
        .error-message {
            background-color: rgba(220,53,69,0.2);
            color: #f9acac;
            border: 1px solid var(--danger);
            padding: 0.4rem;
            border-radius: var(--radius-sm);
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 0.8rem;
            font-weight: 600;
            display: none;
        }
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.4rem;
            flex: 1;
        }
        .btn {
            background: rgba(180,133,84,0.1);
            border: 1px solid var(--border-light);
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
        }
        .btn:hover {
            background: rgba(180,133,84,0.3);
            border-color: var(--accent-glow);
            color: #fff;
        }
        .btn:active { transform: scale(0.96); }
        .btn-number { font-weight: 700; font-size: 1.1rem; color: var(--text-light); }
        .btn-operator {
            background: rgba(180,133,84,0.15);
            color: var(--accent-soft);
            border-color: rgba(180,133,84,0.3);
            font-weight: 800;
            font-size: 1.1rem;
        }
        .btn-operator:hover { background: rgba(180,133,84,0.4); }
        .btn-memory { font-size: 0.8rem; color: var(--text-muted); }
        .btn-action { color: var(--danger); }
        .btn-equals {
            background: var(--accent-glow);
            color: #111;
            grid-column: span 2;
            border: none;
        }
        .btn-equals:hover { background: var(--gold-light); color: #111; }
        .btn-finance {
            font-family: 'Tajawal', sans-serif;
            font-size: 0.8rem;
            background: rgba(30,74,122,0.3);
            border-color: #1e4a7a;
            color: #8ab8ff;
        }
        .btn-finance:hover { background: rgba(30,74,122,0.5); color: #fff; }

        /* قسم السجل */
        .history-panel {
            flex: 1;
            background: var(--bg-panel);
            backdrop-filter: blur(10px);
            border: 2px solid var(--border-light);
            border-radius: var(--radius-md);
            padding: 1.2rem;
            box-shadow: var(--shadow-soft);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 0.8rem;
            border-bottom: 1px solid var(--border-light);
        }
        .history-header h3 {
            color: var(--accent-soft);
            font-size: 1.1rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .history-controls {
            display: flex;
            gap: 0.5rem;
        }
        .filter-select {
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius-sm);
            border: 2px solid var(--border-light);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            outline: none;
            background: rgba(10,14,23,0.7);
            color: var(--text-light);
        }
        .filter-select option { background: #0b0e17; color: var(--text-light); }
        .btn-export {
            background: rgba(180,133,84,0.15);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 1rem;
            color: var(--accent-soft);
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
        }
        .btn-export:hover {
            background: rgba(180,133,84,0.3);
            color: #fff;
            border-color: var(--accent-glow);
            box-shadow: 0 0 15px rgba(180,133,84,0.3);
        }
        .table-container {
            flex: 1;
            overflow-y: auto;
            border: 2px solid var(--border-light);
            border-radius: var(--radius-sm);
            background: rgba(10,14,23,0.5);
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }
        .history-table th {
            background: rgba(180,133,84,0.2);
            color: var(--accent-soft);
            font-size: 0.85rem;
            font-weight: 700;
            padding: 0.6rem 0.8rem;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--border-light);
        }
        .history-table td {
            padding: 0.6rem 0.8rem;
            border-bottom: 1px solid var(--border-light);
            font-size: 0.9rem;
            color: var(--text-muted);
            vertical-align: middle;
        }
        .history-table tr:hover { background: rgba(180,133,84,0.1); }
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            font-family: 'Inter', sans-serif;
        }
        .badge-math { background: rgba(0,100,200,0.2); color: #8ab8ff; }
        .badge-finance { background: rgba(255,193,7,0.2); color: #ffd966; }
        .td-operation {
            font-family: 'Inter', monospace;
            color: var(--text-light);
            direction: ltr;
            text-align: left;
        }
        .td-result {
            font-family: 'Inter', monospace;
            font-weight: 700;
            color: var(--accent-soft);
            direction: ltr;
            text-align: left;
        }
        .action-btns {
            display: flex;
            gap: 0.4rem;
            justify-content: flex-end;
        }
        .icon-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.3rem;
            border-radius: 4px;
            transition: 0.2s;
        }
        .icon-btn.restore:hover { color: var(--accent-glow); background: rgba(180,133,84,0.2); }
        .icon-btn.delete:hover { color: var(--danger); background: rgba(220,53,69,0.2); }
        .btn-clear-all {
            width: 100%;
            margin-top: 1rem;
            padding: 0.6rem;
            background: rgba(220,53,69,0.1);
            border: 1px solid var(--danger);
            color: #f9acac;
            font-weight: 700;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: 0.2s;
            font-family: 'Tajawal', sans-serif;
        }
        .btn-clear-all:hover {
            background: rgba(220,53,69,0.2);
            border-color: #f87171;
        }

        /* الفوتر */
        .footer-simple {
            text-align: center;
            padding: 1rem;
            margin-top: 2rem;
            background: rgba(10,14,23,0.5);
            backdrop-filter: blur(5px);
            border-top: 1px solid var(--border-light);
            color: var(--text-muted);
            font-size: 0.85rem;
            position: relative;
            z-index: 2;
        }
        .footer-simple span { color: var(--accent-soft); font-weight: 700; }

        @media (max-width: 850px) {
            .calc-container { flex-direction: column; align-items: center; }
            .calculator { flex: none; width: 100%; max-width: 400px; margin: 0 auto; }
            .history-panel { flex: none; width: 100%; height: 400px; margin-top: 1rem; }
        }
        @media (max-width: 768px) {
            .header-bar { margin: 0.5rem; padding: 0.5rem 1rem; flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
<body style="overflow-x: hidden;">
    <div class="glow-bg"><span></span><span></span><span></span></div>

    <!-- الهيدر (بدون اسم المستخدم وزر الخروج) -->
    <div class="header-bar">
        <div class="datetime">
            <div><i class="fas fa-calendar-alt"></i> <span id="currentDate"></span></div>
            <div><i class="fas fa-clock"></i> <span id="currentTime"></span></div>
        </div>
        <div class="header-title">مجموعة فاروق للاستشارات والأعمال</div>
    </div>

    <div class="main-content">
        <div class="calc-container">
            <div class="calculator">
                <div class="calculator-header">
                    <h2><i class="fas fa-calculator"></i> الحاسبة الاستشارية</h2>
                </div>
                <div class="error-message" id="errorMessage"></div>
                <div class="screen-container">
                    <div class="history-display" id="historyDisplay"></div>
                    <div class="main-display" id="display">0</div>
                </div>
                <div class="buttons-grid">
                    <button class="btn btn-memory" onclick="handleMemory('MC')">MC</button>
                    <button class="btn btn-memory" onclick="handleMemory('MR')">MR</button>
                    <button class="btn btn-memory" onclick="handleMemory('M+')">M+</button>
                    <button class="btn btn-memory" onclick="handleMemory('M-')">M-</button>
                    <button class="btn btn-action" onclick="clearEntry()">CE</button>

                    <button class="btn btn-number" onclick="appendToDisplay('9')">9</button>
                    <button class="btn btn-number" onclick="appendToDisplay('8')">8</button>
                    <button class="btn btn-number" onclick="appendToDisplay('7')">7</button>
                    <button class="btn btn-operator" onclick="setOperator('/')">÷</button>
                    <button class="btn btn-action" onclick="clearDisplay()">C</button>

                    <button class="btn btn-number" onclick="appendToDisplay('6')">6</button>
                    <button class="btn btn-number" onclick="appendToDisplay('5')">5</button>
                    <button class="btn btn-number" onclick="appendToDisplay('4')">4</button>
                    <button class="btn btn-operator" onclick="setOperator('*')">×</button>
                    <button class="btn" onclick="backspace()"><i class="fas fa-backspace"></i></button>

                    <button class="btn btn-number" onclick="appendToDisplay('3')">3</button>
                    <button class="btn btn-number" onclick="appendToDisplay('2')">2</button>
                    <button class="btn btn-number" onclick="appendToDisplay('1')">1</button>
                    <button class="btn btn-operator" onclick="setOperator('-')">-</button>
                    <button class="btn" onclick="calculateSquareRoot()">√</button>

                    <button class="btn" onclick="toggleSign()">±</button>
                    <button class="btn btn-number" onclick="appendToDisplay('.')">.</button>
                    <button class="btn btn-number" onclick="appendToDisplay('0')">0</button>
                    <button class="btn btn-operator" onclick="setOperator('+')">+</button>
                    <button class="btn" onclick="calculatePercent()">%</button>

                    <button class="btn btn-finance" onclick="applyTax()">ضريبة</button>
                    <button class="btn btn-finance" onclick="applyDiscount()">خصم</button>
                    <button class="btn btn-finance" onclick="calculateROI()">ROI</button>
                    <button class="btn btn-finance" onclick="calculateSimpleInterest()">فائدة</button>
                    <button class="btn" onclick="power()">xʸ</button>

                    <button class="btn btn-equals" onclick="calculateResult()">=</button>
                    <button class="btn" onclick="calculateReciprocal()">1/x</button>
                    <button class="btn" onclick="log10()">log</button>
                    <button class="btn" onclick="factorial()">n!</button>
                </div>
            </div>

            <div class="history-panel">
                <div class="history-header">
                    <h3><i class="fas fa-table"></i> سجل العمليات</h3>
                    <div class="history-controls">
                        <select id="filterSelect" class="filter-select" onchange="filterHistory()">
                            <option value="all">كل العمليات</option>
                            <option value="+">جمع (+)</option>
                            <option value="-">طرح (-)</option>
                            <option value="*">ضرب (×)</option>
                            <option value="/">قسمة (÷)</option>
                            <option value="مالية">عمليات مالية / متقدمة</option>
                        </select>
                        <button class="btn-export" onclick="exportHistory()"><i class="fas fa-download"></i> تصدير CSV</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="history-table">
                        <thead>
                            <tr><th style="width: 15%;">النوع</th><th style="width: 45%;">العملية المنجزة</th><th style="width: 25%;">النتيجة</th><th style="width: 15%; text-align: center;">إجراء</th> </>
                        </thead>
                        <tbody id="historyTableBody"></tbody>
                     </table>
                </div>
                <button class="btn-clear-all" onclick="clearHistory()"><i class="fas fa-trash-alt"></i> مسح كامل السجل</button>
            </div>
        </div>
    </div>

    <footer class="footer-simple">
        جميع الحقوق محفوظة © 2026 <span>FAROUK GRUP</span>
    </footer>

    <!-- زر العودة إلى الرئيسية (عائم) -->
    <a href="index.html" style="position: fixed; bottom: 20px; right: 20px; background: rgba(180,133,84,0.9); color: white; padding: 12px 20px; border-radius: 50px; text-decoration: none; font-family: 'Tajawal', sans-serif; font-weight: bold; backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 9999; display: flex; align-items: center; gap: 8px; transition: 0.3s;" onmouseover="this.style.backgroundColor='#b48554'; this.style.transform='scale(1.05)';" onmouseout="this.style.backgroundColor='rgba(180,133,84,0.9)'; this.style.transform='scale(1)';">
        <i class="fas fa-home"></i> الرئيسية
    </a>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800, once: true });

        // ========== دوال الوقت والتاريخ فقط ==========
        function updateDateTime() {
            const now = new Date();
            document.getElementById('currentDate').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
            document.getElementById('currentTime').innerText = now.toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
        }
        setInterval(updateDateTime, 1000);
        updateDateTime();

        // ========== كود الآلة الحاسبة كامل (من الملف الأصلي) ==========
        let display = document.getElementById('display');
        let historyDisplayElem = document.getElementById('historyDisplay');
        let errorMsgElem = document.getElementById('errorMessage');
        let historyTableBody = document.getElementById('historyTableBody');

        let currentInput = '0';
        let previousInput = '';
        let operator = null;
        let memory = 0;
        let history = [];

        function showError(text) {
            errorMsgElem.style.display = 'block';
            errorMsgElem.innerText = text;
            setTimeout(() => { errorMsgElem.style.display = 'none'; }, 3000);
        }

        function updateDisplay() {
            if(currentInput.length > 15 && !currentInput.includes('e')) {
                let num = parseFloat(currentInput);
                display.innerText = Number.isInteger(num) ? num : num.toPrecision(12).replace(/\.?0+$/, '');
            } else {
                display.innerText = currentInput;
            }
        }

        function appendToDisplay(value) {
            if (currentInput === '0' && value !== '.') {
                currentInput = value;
            } else {
                if (value === '.' && currentInput.includes('.')) return;
                currentInput += value;
            }
            updateDisplay();
        }

        function clearDisplay() {
            currentInput = '0';
            previousInput = '';
            operator = null;
            updateDisplay();
            historyDisplayElem.innerText = '';
        }

        function clearEntry() {
            currentInput = '0';
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = '0';
            }
            if(currentInput === '-') currentInput = '0';
            updateDisplay();
        }

        function setOperator(op) {
            if (operator !== null && previousInput !== '') {
                calculateResult(false);
            }
            previousInput = currentInput;
            currentInput = '0';
            operator = op;
            historyDisplayElem.innerText = previousInput + ' ' + operator;
        }

        function calculateResult(saveToHistory = true) {
            if (operator === null || previousInput === '') return;

            let prev = parseFloat(previousInput);
            let curr = parseFloat(currentInput);
            let result;
            let type = operator;

            switch (operator) {
                case '+': result = prev + curr; break;
                case '-': result = prev - curr; break;
                case '*': result = prev * curr; break;
                case '/': 
                    if (curr === 0) {
                        showError('خطأ رياضي: القسمة على صفر');
                        return;
                    }
                    result = prev / curr; 
                    break;
                default: return;
            }

            result = Math.round(result * 1000000000) / 1000000000;

            let operationStr = `${previousInput} ${operator} ${currentInput} = ${result}`;
            
            if(saveToHistory) {
                history.unshift({ text: operationStr, type: type });
                if (history.length > 50) history.pop();
                filterHistory();
            }

            currentInput = result.toString();
            previousInput = '';
            operator = null;
            historyDisplayElem.innerText = operationStr;
            updateDisplay();
        }

        function toggleSign() {
            if (currentInput !== '0') {
                currentInput = (parseFloat(currentInput) * -1).toString();
                updateDisplay();
            }
        }

        function calculatePercent() {
            let curr = parseFloat(currentInput);
            let result;

            if (previousInput !== '' && operator !== null) {
                let prev = parseFloat(previousInput);
                if (operator === '+') result = prev + (prev * curr / 100);
                else if (operator === '-') result = prev - (prev * curr / 100);
                else if (operator === '*') result = prev * (curr / 100);
                else if (operator === '/') result = prev / (curr / 100);
                else result = curr / 100;
                
                result = Math.round(result * 1000000000) / 1000000000;
                let operationStr = `${prev} ${operator} ${curr}% = ${result}`;
                history.unshift({ text: operationStr, type: operator });
                filterHistory();
                historyDisplayElem.innerText = operationStr;
                currentInput = result.toString();
                previousInput = '';
                operator = null;
            } else {
                result = curr / 100;
                currentInput = result.toString();
            }
            updateDisplay();
        }

        function calculateSquareRoot() {
            let value = parseFloat(currentInput);
            if (value < 0) {
                showError('لا يمكن حساب الجذر لعدد سالب');
                return;
            }
            let res = Math.sqrt(value);
            res = Math.round(res * 1000000000) / 1000000000;
            currentInput = res.toString();
            history.unshift({ text: `√(${value}) = ${currentInput}`, type: 'مالية' });
            filterHistory();
            updateDisplay();
        }

        function calculateReciprocal() {
            let value = parseFloat(currentInput);
            if (value === 0) {
                showError('لا يمكن القسمة على الصفر');
                return;
            }
            let res = 1 / value;
            res = Math.round(res * 1000000000) / 1000000000;
            currentInput = res.toString();
            history.unshift({ text: `1/(${value}) = ${currentInput}`, type: 'مالية' });
            filterHistory();
            updateDisplay();
        }

        function power() {
            let base = parseFloat(currentInput);
            let exponent = prompt('أدخل قيمة الأس (القوة):', '2');
            if (exponent === null || exponent.trim() === '') return;
            let exp = parseFloat(exponent);
            if (isNaN(exp)) { showError('قيمة غير صالحة'); return; }
            
            let res = Math.pow(base, exp);
            res = Math.round(res * 1000000000) / 1000000000;
            currentInput = res.toString();
            history.unshift({ text: `${base}^${exp} = ${currentInput}`, type: 'مالية' });
            filterHistory();
            updateDisplay();
        }

        function log10() {
            let val = parseFloat(currentInput);
            if (val <= 0) { showError('اللوغاريتم للأعداد الموجبة فقط'); return; }
            let res = Math.log10(val);
            res = Math.round(res * 1000000000) / 1000000000;
            currentInput = res.toString();
            history.unshift({ text: `log10(${val}) = ${currentInput}`, type: 'مالية' });
            filterHistory();
            updateDisplay();
        }

        function factorial() {
            let n = parseInt(currentInput);
            if (isNaN(n) || n < 0 || n > 170) { 
                showError('يجب إدخال عدد صحيح موجب (أقل من 170)'); 
                return; 
            }
            let fact = 1;
            for (let i = 2; i <= n; i++) fact *= i;
            currentInput = fact.toString();
            history.unshift({ text: `${n}! = ${currentInput}`, type: 'مالية' });
            filterHistory();
            updateDisplay();
        }

        function applyTax() {
            let rate = prompt('أدخل نسبة الضريبة المضافة (%) (مثال: 15):', '15');
            if (rate === null || rate.trim() === '') return;
            let r = parseFloat(rate);
            if (isNaN(r)) return;
            
            let amount = parseFloat(currentInput);
            let taxValue = amount * (r / 100);
            let result = amount + taxValue;
            result = Math.round(result * 100) / 100;
            
            history.unshift({ text: `${amount} + ضريبة ${r}% = ${result}`, type: 'مالية' });
            currentInput = result.toString();
            updateDisplay();
            filterHistory();
        }

        function applyDiscount() {
            let rate = prompt('أدخل نسبة الخصم (%) (مثال: 10):', '10');
            if (rate === null || rate.trim() === '') return;
            let r = parseFloat(rate);
            if (isNaN(r)) return;
            
            let amount = parseFloat(currentInput);
            let discountValue = amount * (r / 100);
            let result = amount - discountValue;
            result = Math.round(result * 100) / 100;
            
            history.unshift({ text: `${amount} - خصم ${r}% = ${result}`, type: 'مالية' });
            currentInput = result.toString();
            updateDisplay();
            filterHistory();
        }

        function calculateROI() {
            let cost = parseFloat(currentInput);
            if(cost === 0) { showError('يجب أن تكون التكلفة أكبر من صفر'); return; }
            
            let revenue = prompt('أدخل العائد الإجمالي المتوقع:', cost * 1.2);
            if (revenue === null || revenue.trim() === '') return;
            let rev = parseFloat(revenue);
            if (isNaN(rev)) return;
            
            let roi = ((rev - cost) / cost) * 100;
            roi = Math.round(roi * 100) / 100;
            
            history.unshift({ text: `ROI (تكلفة:${cost}, عائد:${rev}) = %${roi}`, type: 'مالية' });
            currentInput = roi.toString();
            updateDisplay();
            filterHistory();
        }

        function calculateSimpleInterest() {
            let principal = parseFloat(currentInput);
            
            let rate = prompt('معدل الفائدة السنوي المتوقع (%)', '5');
            if (rate === null || rate.trim() === '') return;
            let r = parseFloat(rate) / 100;
            
            let time = prompt('المدة الزمنية (بالسنوات)', '1');
            if (time === null || time.trim() === '') return;
            let t = parseFloat(time);
            
            if (isNaN(r) || isNaN(t)) return;
            
            let interest = principal * r * t;
            interest = Math.round(interest * 100) / 100;
            
            history.unshift({ text: `فائدة (${principal}×${r*100}%×${t}سنة) = ${interest}`, type: 'مالية' });
            currentInput = interest.toString();
            updateDisplay();
            filterHistory();
        }

        function handleMemory(cmd) {
            let value = parseFloat(currentInput);
            switch (cmd) {
                case 'MC': memory = 0; historyDisplayElem.innerText = "Memory Cleared"; setTimeout(()=>historyDisplayElem.innerText="",1000); break;
                case 'MR': currentInput = memory.toString(); updateDisplay(); break;
                case 'M+': memory += value; historyDisplayElem.innerText = "M+ " + value; setTimeout(()=>historyDisplayElem.innerText="",1000); break;
                case 'M-': memory -= value; historyDisplayElem.innerText = "M- " + value; setTimeout(()=>historyDisplayElem.innerText="",1000); break;
            }
        }

        function renderHistory(filteredList) {
            historyTableBody.innerHTML = '';
            if(filteredList.length === 0) {
                historyTableBody.innerHTML = ` ones<td colspan="4" style="text-align: center; color: var(--text-muted); padding: 2rem 0;">لا توجد عمليات مسجلة حالياً</td> </tr>`;
                return;
            }

            filteredList.forEach((item, index) => {
                let parts = item.text.split('=');
                let operationStr = parts[0] ? parts[0].trim() : '';
                let resultStr = parts[1] ? parts[1].trim() : item.text;
                let badgeClass = item.type === 'مالية' ? 'badge-finance' : 'badge-math';

                let tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><span class="badge ${badgeClass}">${item.type}</span></td>
                    <td class="td-operation">${operationStr}</td>
                    <td class="td-result">${resultStr}</td>
                    <td>
                        <div class="action-btns">
                            <button class="icon-btn restore" title="استخدام النتيجة" onclick="restoreResult('${resultStr}')"><i class="fas fa-reply"></i></button>
                            <button class="icon-btn delete" title="حذف القيد" onclick="deleteHistoryItem(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                `;
                historyTableBody.appendChild(tr);
            });
        }

        function restoreResult(val) {
            val = val.replace('%', '').trim();
            currentInput = val;
            updateDisplay();
        }

        function filterHistory() {
            let filter = document.getElementById('filterSelect').value;
            let filtered = history;
            if (filter !== 'all') {
                filtered = history.filter(item => item.type === filter);
            }
            renderHistory(filtered);
        }

        function deleteHistoryItem(index) {
            let filter = document.getElementById('filterSelect').value;
            let displayed = (filter === 'all') ? history : history.filter(i => i.type === filter);
            let realItem = displayed[index];
            let actualIndex = history.findIndex(i => i === realItem);
            if (actualIndex !== -1) history.splice(actualIndex, 1);
            filterHistory();
        }

        function clearHistory() {
            if(confirm("هل أنت متأكد من مسح كافة سجلات الحسابات؟")) {
                history = [];
                filterHistory();
            }
        }

        function exportHistory() {
            if(history.length === 0) {
                showError("السجل فارغ، لا يوجد ما يمكن تصديره");
                return;
            }
            let csv = 'النوع,العملية المنجزة,النتيجة\n';
            history.forEach(item => {
                let parts = item.text.split('=');
                let op = parts[0].trim().replace(/"/g, '""');
                let res = parts[1] ? parts[1].trim().replace(/"/g, '""') : '';
                csv += `"${item.type}","${op}","${res}"\n`;
            });
            let blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
            let link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `سجل_حسابات_مجموعة_فاروق_${new Date().toISOString().slice(0,10)}.csv`;
            link.click();
        }

        // دعم لوحة المفاتيح
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === "INPUT" || e.target.tagName === "TEXTAREA") return;
            const key = e.key;
            if (['+', '-', '*', '/', '=', 'Enter', 'Escape', 'Backspace', 'Delete', '%'].includes(key) || 
                (key >= '0' && key <= '9') || key === '.') {
                e.preventDefault();
            }
            if (key >= '0' && key <= '9') appendToDisplay(key);
            else if (key === '.') appendToDisplay('.');
            else if (key === '+') setOperator('+');
            else if (key === '-') setOperator('-');
            else if (key === '*') setOperator('*');
            else if (key === '/') setOperator('/');
            else if (key === '=' || key === 'Enter') calculateResult();
            else if (key === 'Escape') clearDisplay();
            else if (key === 'Delete') clearEntry();
            else if (key === 'Backspace') backspace();
        });

        // تهيئة الجدول
        filterHistory();
    </script>
</body>
</html>
