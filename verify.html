<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>التحقق من الشهادة | FAROUK GRUP Training</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .result-box {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }
        .logo {
            width: 180px;
            margin-bottom: 20px;
        }
        .success { color: #2e7d32; font-size: 24px; margin: 15px 0; }
        .error { color: #b22222; font-size: 24px; margin: 15px 0; }
        .code {
            background: #f0f0f0;
            padding: 10px 15px;
            border-radius: 6px;
            font-family: monospace;
            margin: 10px 0;
            direction: ltr;
            display: inline-block;
        }
        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: #b8860b;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="result-box">
        <!-- الشعار (يمكنك تغيير المسار إذا كان لديك شعار مرفوع على السيرفر) -->
        <img src="https://lh3.googleusercontent.com/d/1e6u-DPTinDJl_Q9wW3QvGgzFbXO_2sXa" 
             alt="Farouk Grup Logo" class="logo"
             onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22180%22 height=%2260%22%3E%3Crect width=%22180%22 height=%2260%22 fill=%22%23f0e6d2%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-size=%2222%22 fill=%22%23b8860b%22%3EFAROUK GRUP%3C/text%3E%3C/svg%3E'">

        <h2>التحقق من شهادة التدريب</h2>
        <div id="result"></div>
        <a href="https://training.farouk-grup.com" class="back-link">العودة للموقع الرئيسي</a>
    </div>

    <script>
        // استخراج الكود من الرابط ?code=XXXX
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');

        // قائمة الأكواد الصحيحة (قم بتحديثها حسب الشهادات التي تصدرها)
        const validCodes = [
            'PS-RM-2026-123',
            'PS-RM-2026-345',
            'PS-RM-2026-678'
            // أضف هنا الأكواد التي تولدها
        ];

        const resultDiv = document.getElementById('result');

        if (!code) {
            resultDiv.innerHTML = `<p class="error">❌ لم يتم توفير كود الشهادة</p>`;
        } else if (validCodes.includes(code)) {
            resultDiv.innerHTML = `
                <p class="success">✅ الشهادة صحيحة وسارية</p>
                <p>كود الشهادة: <span class="code">${code}</span></p>
                <p style="color:#555;">صادرة عن FAROUK GRUP Training – معتمدة.</p>
            `;
        } else {
            resultDiv.innerHTML = `
                <p class="error">❌ هذا الكود غير معروف أو الشهادة غير صالحة</p>
                <p>كود الشهادة: <span class="code">${code}</span></p>
                <p style="color:#555;">يرجى التأكد من الكود أو التواصل مع الدعم.</p>
            `;
        }
    </script>
</body>
</html>
