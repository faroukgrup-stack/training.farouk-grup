<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - الصفحة غير موجودة | مجموعة فاروق للتدريب</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Alexandria:wght@700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        /* ===== ROOT VARIABLES ===== */
        :root {
            --gold: #b8860b;
            --gold-light: #d4a017;
            --dark: #1e2a2f;
            --dark-light: #2c3e4a;
            --grey: #5a6b7a;
            --light: #f8f6f2;
            --white: #ffffff;
            --shadow-soft: 0 15px 35px -10px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(184, 134, 11, 0.1);
            --shadow-glow: 0 20px 40px -10px rgba(0, 0, 0, 0.15), 0 0 0 2px rgba(184, 134, 11, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--light);
            color: var(--dark-light);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            margin: 0;
            background-image: radial-gradient(circle at 20% 30%, rgba(184, 134, 11, 0.04) 0%, transparent 60%),
                              radial-gradient(circle at 80% 70%, rgba(184, 134, 11, 0.04) 0%, transparent 60%);
        }

        /* ===== حاوية الصفحة ===== */
        .error-wrapper {
            width: 100%;
            max-width: 520px;
            text-align: center;
        }

        /* ===== بطاقة 404 ===== */
        .error-container {
            background: var(--white);
            border-radius: 32px;
            padding: 3rem 2.5rem;
            box-shadow: var(--shadow-soft);
            border: 1px solid rgba(184, 134, 11, 0.2);
            transition: 0.4s ease;
            position: relative;
            overflow: hidden;
        }
        .error-container::before {
            content: '';
            position: absolute;
            top: -60%;
            right: -60%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 40%, rgba(184, 134, 11, 0.03) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }
        .error-container:hover {
            border-color: var(--gold);
            box-shadow: var(--shadow-glow);
            transform: translateY(-5px);
        }

        .error-content {
            position: relative;
            z-index: 1;
        }

        /* ===== شعار الشركة (بديل الأيقونة) ===== */
        .error-logo {
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .error-logo img {
            max-height: 90px;
            width: auto;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.06));
            transition: transform 0.4s ease;
        }
        .error-container:hover .error-logo img {
            transform: scale(1.05);
        }

        /* ===== رقم 404 ===== */
        .error-code {
            font-size: 5.5rem;
            font-weight: 900;
            font-family: 'Alexandria', sans-serif;
            background: linear-gradient(135deg, #f0e6d2, #cfd9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.1;
            margin-bottom: 0.5rem;
            letter-spacing: -2px;
        }

        /* ===== النصوص ===== */
        .error-title {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--dark);
            margin-bottom: 0.75rem;
        }

        .error-desc {
            font-size: 1.05rem;
            color: var(--grey);
            margin-bottom: 2.2rem;
            line-height: 1.8;
        }

        /* ===== الأزرار ===== */
        .error-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--gold);
            color: #111;
            padding: 14px 34px;
            border-radius: 60px;
            font-weight: 800;
            font-size: 1.05rem;
            text-decoration: none;
            transition: 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 8px 20px rgba(184, 134, 11, 0.2);
        }
        .btn-home:hover {
            background: var(--gold-light);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(184, 134, 11, 0.35);
            border-color: var(--dark);
        }

        .btn-contact {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(184, 134, 11, 0.08);
            color: var(--gold);
            padding: 14px 34px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.05rem;
            text-decoration: none;
            transition: 0.3s;
            border: 2px solid var(--gold);
        }
        .btn-contact:hover {
            background: var(--gold);
            color: #111;
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(184, 134, 11, 0.2);
        }

        /* ===== رابط العودة ===== */
        .help-link {
            display: block;
            margin-top: 1.8rem;
            color: var(--grey);
            font-size: 0.95rem;
            text-decoration: none;
            transition: 0.3s;
        }
        .help-link i {
            color: var(--gold);
            margin-left: 6px;
        }
        .help-link:hover {
            color: var(--gold);
        }

        /* ===== تجاوب ===== */
        @media (max-width: 550px) {
            body {
                padding: 1.5rem;
            }
            .error-container {
                padding: 2.2rem 1.5rem;
            }
            .error-code {
                font-size: 4.2rem;
            }
            .error-title {
                font-size: 1.3rem;
            }
            .error-desc {
                font-size: 0.95rem;
            }
            .error-logo img {
                max-height: 70px;
            }
            .btn-home,
            .btn-contact {
                padding: 12px 24px;
                font-size: 0.95rem;
                width: 100%;
                justify-content: center;
            }
            .error-actions {
                flex-direction: column;
                align-items: center;
            }
        }

        @media (max-width: 400px) {
            .error-code {
                font-size: 3.5rem;
            }
            .error-logo img {
                max-height: 60px;
            }
            .error-container {
                padding: 1.8rem 1.2rem;
            }
        }
    </style>
</head>

<body>

    <div class="error-wrapper">
        <!-- ===== بطاقة 404 ===== -->
        <div class="error-container">
            <div class="error-content">
                <!-- شعار الشركة بدلاً من أيقونة الشوكة والسكينة -->
                <div class="error-logo">
                    <img src="https://lh3.googleusercontent.com/d/1e6u-DPTinDJl_Q9wW3QvGgzFbXO_2sXa" alt="FAROUK GRUP TRAINING" />
                </div>

                <div class="error-code">404</div>
                <h2 class="error-title">عذراً، الصفحة غير موجودة</h2>
                <p class="error-desc">
                    يبدو أن الرابط الذي تتبعه قد انتهى أو تم نقله.<br />
                    لكن لا تقلق، يمكنك العودة إلى البداية أو التواصل معنا.
                </p>
                <div class="error-actions">
                    <a href="index.html" class="btn-home">
                        <i class="fas fa-home"></i> الرئيسية
                    </a>
                    <a href="inquiries.html" class="btn-contact">
                        <i class="fas fa-headset"></i> اتصل بنا
                    </a>
                </div>
        </div>
    </div>

</body>
</html>
