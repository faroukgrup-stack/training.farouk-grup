<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة | مجموعة فاروق للمطاعم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root { --bg-dark:#0b0e17; --bg-panel:rgba(18,24,36,0.75); --bg-card:rgba(22,30,46,0.7); --border-light:rgba(180,133,84,0.25); --accent-glow:#b48554; --accent-soft:#cfa776; --text-light:#f0f4fa; --text-muted:#aab7d4; --shadow-soft:0 15px 35px -10px rgba(0,0,0,0.6),0 0 0 1px rgba(180,133,84,0.15); --shadow-glow:0 15px 35px -10px rgba(0,0,0,0.8),0 0 20px rgba(180,133,84,0.3); --radius-md:20px; --radius-lg:30px; --transition:all 0.3s ease; }
        body { font-family:'Tajawal',sans-serif; background:radial-gradient(circle at 70% 30%,#141c2b,#0a0e16); color:var(--text-light); line-height:1.6; min-height:100vh; display:flex; align-items:center; justify-content:center; position:relative; margin:0; padding:2rem; }
        .glow-bg { position:fixed; width:100%; height:100%; top:0; left:0; pointer-events:none; z-index:0; }
        .glow-bg span { position:absolute; width:400px; height:400px; background:radial-gradient(circle,rgba(180,133,84,0.15) 0%,transparent 70%); border-radius:50%; filter:blur(80px); animation:glowMove 20s infinite alternate ease-in-out; }
        .glow-bg span:nth-child(1) { top:-100px; right:-100px; width:500px; height:500px; background:radial-gradient(circle,rgba(180,133,84,0.12) 0%,transparent 70%); }
        .glow-bg span:nth-child(2) { bottom:-150px; left:-150px; width:600px; height:600px; background:radial-gradient(circle,rgba(100,150,200,0.1) 0%,transparent 70%); }
        .glow-bg span:nth-child(3) { top:30%; left:30%; width:300px; height:300px; background:radial-gradient(circle,rgba(180,133,84,0.1) 0%,transparent 70%); animation-delay:-5s; }
        @keyframes glowMove { 0%{transform:translate(0,0) scale(1);opacity:0.5;} 100%{transform:translate(40px,-30px) scale(1.2);opacity:0.8;} }

        .error-container {
            text-align: center;
            max-width: 500px;
            width: 90%;
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(184, 134, 11, 0.5);
            border-radius: 25px;
            padding: 2.5rem;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            position: relative;
            z-index: 10;
        }
        .error-container:hover {
            border-color: var(--accent-glow);
            box-shadow: var(--shadow-glow);
        }
        .error-icon {
            font-size: 5rem;
            background: linear-gradient(145deg, #cfa776, #e2c5a3);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #f0e6d2, #cfd9ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: rgba(180,133,84,0.2);
            border: 1px solid rgba(180,133,84,0.3);
            border-radius: 50px;
            padding: 0.9rem 2rem;
            color: var(--accent-soft);
            font-weight: 700;
            text-decoration: none;
            transition: var(--transition);
            font-size: 1rem;
        }
        .btn-home:hover {
            background: rgba(180,133,84,0.4);
            color: white;
            border-color: var(--accent-glow);
            transform: translateY(-3px);
            box-shadow: 0 0 25px rgba(180,133,84,0.3);
        }
        @media (max-width: 550px) {
            .error-container { padding: 2rem; }
            h1 { font-size: 3rem; }
            .error-icon { font-size: 4rem; }
        }
    </style>
</head>
<body>
    <div class="glow-bg"><span></span><span></span><span></span></div>

    <div class="error-container">
        <div class="error-icon"><i class="fas fa-utensils"></i></div>
        <h1>404</h1>
        <p>عذراً، الصفحة التي تبحث عنها غير متوفرة في منصة إدارة المطاعم.</p>
        <a href="index.html" class="btn-home"><i class="fas fa-home"></i> العودة إلى الرئيسية</a>
    </div>
</body>
</html>
