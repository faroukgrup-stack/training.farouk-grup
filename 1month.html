<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تفعيل اشتراك المطاعم - مجموعة فاروق</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: #0b0e17; color: white;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .reg-card {
            background: rgba(18, 24, 36, 0.9);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            width: 100%; max-width: 450px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h2 { color: #d4af37; margin-bottom: 10px; }
        input {
            width: 100%; padding: 12px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid #333;
            color: white; border-radius: 8px; font-family: inherit; text-align: center;
        }
        input:focus { border-color: #d4af37; outline: none; }
        input[readonly] { background: rgba(255,255,255,0.02); color: #d4af37; cursor: not-allowed; font-weight: bold; }
        button {
            width: 100%; padding: 15px; margin-top: 20px;
            background: linear-gradient(135deg, #d4af37, #aa8a2e);
            border: none; border-radius: 8px; color: #000; font-weight: bold; cursor: pointer;
            transition: 0.3s; font-size: 1rem;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(212,175,55,0.4); }
        button:disabled { background: #555; cursor: not-allowed; }
        .success-msg { color: #4bb543; display: none; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="reg-card">
    <i class="fas fa-utensils" style="font-size: 3rem; color: #d4af37; margin-bottom: 20px;"></i>
    <h2>تفعيل حساب المشترك منصة المطاعم</h2>
    <p style="font-size: 0.9rem; color: #ccc;">يرجى إدخال بيانات الدخول الخاصة بك</p>

    <form id="registrationForm">
        <input type="text" name="fullName" placeholder="الاسم الكامل (أو اسم المطعم)" required>
        <input type="text" name="username" placeholder="اسم المستخدم (بالإنجليزي)" required>
        <input type="password" name="password" placeholder="كلمة المرور" required>
        
        <label style="display:block; text-align:right; font-size: 0.8rem; margin-top: 10px; color: #d4af37;">تاريخ انتهاء الاشتراك تلقائياً (بعد شهر):</label>
        <input type="text" id="expiryDisplay" readonly>
        
        <input type="hidden" name="duration" value="1">
        
        <button type="submit" id="regBtn">تفعيل الحساب الآن</button>
    </form>
    <div id="msg" class="success-msg">✅ تم التفعيل بنجاح! جاري تحويلك...</div>
</div>

<script>
    // حساب التاريخ بعد شهر للعرض فقط
    const nextMonth = new Date();
    nextMonth.setMonth(nextMonth.getMonth() + 1);
    document.getElementById('expiryDisplay').value = nextMonth.toISOString().split('T')[0];

    const scriptURL = 'https://script.google.com/macros/s/AKfycbyIb8jGIIoBVBEgHIXmAn17QOAF18cCU8-vBsubPPKG-7JwHXcKdKmCnd91J9lV98TZ8Q/exec';

    document.getElementById('registrationForm').addEventListener('submit', e => {
        e.preventDefault();
        const btn = document.getElementById('regBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> جاري الربط...';

        const formData = new FormData(e.target);
        formData.append('action', 'register');

        fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors'})
        .then(() => {
            document.getElementById('msg').style.display = 'block';
            setTimeout(() => {
                // العودة لصفحة الدخول الرئيسية للمطاعم
                window.location.href = 'https://rest-tools.farouk-grup.com/'; 
            }, 2500);
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('حدث خطأ في الاتصال، يرجى المحاولة لاحقاً');
            btn.disabled = false;
            btn.innerHTML = 'تفعيل الحساب الآن';
        });
    });
</script>

</body>
</html>
